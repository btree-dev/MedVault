version: "3.8"

services:
  canton:
    image: ghcr.io/digital-asset/decentralized-canton-sync/docker/canton:0.5.12
    ports:
      - "6865:6865"  # Ledger API
      - "6866:6866"  # Admin API
      - "4401:4401"  # Sequencer public API
      - "4402:4402"  # Sequencer admin API
      - "7575:7575"  # Built-in JSON API
    volumes:
      - ./canton.conf:/app/app.conf
      - ./bootstrap.sc:/app/bootstrap.sc
      - ../daml:/app/daml
    healthcheck:
      test: ["CMD", "grpcurl", "-plaintext", "localhost:6865", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    expose:
      - "80"
    depends_on:
      canton:
        condition: service_healthy

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  caddy_data:
  caddy_config:
